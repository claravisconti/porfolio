<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Clara Visconti | Web and Graphic Designer</title>
  <meta name="description" content="Portfolio de Clara Visconti, diseñadora UX/UI especializada en experiencias digitales e interfaces." />
  
  <!-- 1. RECURSOS DE MÁXIMA PRIORIDAD (LCP) -->
  <!-- Ponemos el póster primero para que sea lo primero que el navegador empiece a descargar -->
  <link rel="preload" href="/images/HeroMobile.webp" as="image" fetchpriority="high" media="(max-width: 768px)">
  <link rel="preload" href="/images/Hero.webp" as="image" fetchpriority="high" media="(min-width: 769px)">
  
  <!-- 2. FUENTES -->
  <link rel="preload" href="/fonts/Inter.woff2" as="font" type="font/woff2" crossorigin="anonymous">

  <!-- 3. PRECARGA DE VIDEO (Prioridad secundaria al póster) -->
  <link rel="preload" href="/videos/Hero.mp4" as="video" type="video/mp4">

  <!-- Meta etiquetas (No afectan performance, pueden ir aquí) -->
  <meta name="author" content="Clara Visconti" />
  <meta property="og:title" content="Clara Visconti | UX/UI Designer" />
  <meta property="og:image" content="https://claravisconti.com.ar/preview.jpg" />
  <link rel="icon" type="image/svg+xml" href="/Iso_teal.svg" />
</head>

<body>
  <!-- El div root debe estar vacío y ser lo primero en el body -->
  <div id="root"></div>

  <!-- 4. SCRIPTS AL FINAL -->
  <!-- Al poner el main.jsx aquí, el navegador ya procesó todo el <head> y el <div> antes de ejecutar JS -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- 5. ANALÍTICAS CON DELAY (Ya lo tienes perfecto) -->
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        // Tu código de Analytics y Clarity...
        var gtagScript = document.createElement('script');
        gtagScript.async = true;
        gtagScript.src = "https://www.googletagmanager.com/gtag/js?id=G-XSZFR9EYG3";
        document.head.appendChild(gtagScript);
        // ... (resto del código)
      }, 3500);
    });
  </script>
</body>
</html>
